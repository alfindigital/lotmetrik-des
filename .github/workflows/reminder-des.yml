name: Reminder rilis DES

# Cek tiap tgl 28 & 29 (07:30 WIB). Cuma bikin "issue" pengingat kalau lagi window
# rilis DES (akhir Mei -> P1, akhir Nov -> P2) DAN data di situs masih rilis lama.
# Otomatis diam begitu data.js sudah kamu update. Ada keepalive bulanan supaya
# GitHub tidak menonaktifkan cron ini (aturan: cron mati kalau repo idle 60 hari).

on:
  schedule:
    - cron: "30 0 28,29 * *"     # 00:30 UTC = 07:30 WIB, tgl 28 & 29 tiap bulan
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Cuma tampilkan (jangan bikin issue)"
        type: boolean
        default: true
      test_month:
        description: "Paksa bulan (1-12) untuk uji, kosongkan untuk pakai bulan asli"
        type: string
        default: ""

permissions:
  contents: write
  issues: write

concurrency:
  group: reminder-des
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # keepalive: commit kecil sekali sebulan biar cron tidak di-disable GitHub
      - name: Keepalive
        if: github.event_name == 'schedule'
        run: |
          month=$(date -d "+7 hours" +%Y-%m)
          f=_update/.last-check
          if [ "$(cat "$f" 2>/dev/null)" != "$month" ]; then
            echo "$month" > "$f"
            git config user.name "des-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$f"
            git commit -m "keepalive $month [skip ci]"
            git push
          fi

      - name: Cek window rilis & ingatkan
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          TEST_MONTH: ${{ github.event.inputs.test_month || '' }}
        with:
          script: |
            const fs = require('fs');
            const dry = process.env.DRY_RUN === 'true';
            const {owner, repo} = context.repo;

            // rilis terakhir yang kita punya
            const raw = fs.readFileSync('data.js', 'utf8');
            const DES = JSON.parse(raw.slice(raw.indexOf('{'), raw.lastIndexOf('}') + 1));
            const last = DES.meta[DES.meta.length - 1].key;   // mis. "2026_P1"

            // waktu WIB
            const now = new Date(Date.now() + 7 * 3600 * 1000);
            let y = now.getUTCFullYear();
            let m = process.env.TEST_MONTH ? parseInt(process.env.TEST_MONTH) : now.getUTCMonth() + 1;

            // window: Mei/Jun -> P1 tahun ini; Nov/Des -> P2 tahun ini
            let expected = null;
            if (m === 5 || m === 6) expected = `${y}_P1`;
            else if (m === 11 || m === 12) expected = `${y}_P2`;

            const num = k => parseInt(k.slice(0, 4)) * 10 + (k.endsWith('P2') ? 2 : 1);

            // bukan window rilis -> selesai (tetap keepalive di step atas)
            if (!expected) { core.info(`Bukan window rilis (bulan ${m}). Terakhir=${last}. Skip.`); return; }

            // helper cari issue reminder terbuka
            const openReminders = async () => (await github.rest.issues.listForRepo(
              {owner, repo, state: 'open', labels: 'des-reminder', per_page: 50})).data;

            // sudah up-to-date -> tutup reminder yang masih terbuka
            if (num(last) >= num(expected)) {
              core.info(`Sudah update (${last} >= ${expected}).`);
              for (const i of await openReminders()) {
                if (!dry) {
                  await github.rest.issues.createComment({owner, repo, issue_number: i.number,
                    body: `Data sudah update ke ${last.replace('_', ' ')}. Menutup reminder otomatis.`});
                  await github.rest.issues.update({owner, repo, issue_number: i.number, state: 'closed'});
                }
                core.info(`${dry ? '[dry] ' : ''}tutup issue #${i.number}`);
              }
              return;
            }

            // masih ketinggalan -> jangan bikin dobel
            const marker = `des-reminder:${expected}`;
            const existing = (await openReminders()).find(i => (i.body || '').includes(marker));
            if (existing) { core.info(`Reminder untuk ${expected} sudah ada (#${existing.number}). Skip.`); return; }

            const isP2 = expected.endsWith('P2');
            const musim = isP2 ? 'akhir tahun (efektif ~1 Des)' : 'pertengahan tahun (efektif ~1 Jun)';
            const title = `🔔 Update DES ${expected.replace('_', ' ')} — cek OJK`;
            const body = [
              `@${owner} 🔔 **Waktunya update Daftar Efek Syariah.**`,
              ``,
              `Sekarang window rilis DES **${expected.replace('_', ' ')}** (${musim}).`,
              `Data di dashboard masih rilis terakhir: **${last.replace('_', ' ')}**.`,
              ``,
              `**Langkah (± 2 menit):**`,
              `1. Unduh Excel DES terbaru dari OJK: https://ojk.go.id/id/kanal/syariah/data-dan-statistik/daftar-efek-syariah/`,
              `2. Ganti nama file jadi: \`DES_${expected.slice(0, 4)}_P${isP2 ? 2 : 1}_KEP<nomor SK>.xlsx\``,
              `3. Upload ke folder \`_update/ojk_excel/\` di repo ini (**Add file → Upload files**), atau double-click \`update.bat\` di PC.`,
              ``,
              `Panduan lengkap: \`_update/CARA-UPDATE.md\``,
              ``,
              `_Reminder ini berhenti & menutup sendiri begitu data.js sudah update ke ${expected.replace('_', ' ')}._`,
              ``,
              `<sub>${marker}</sub>`,
            ].join('\n');

            if (dry) { core.info(`[dry] AKAN bikin issue:\n${title}\n\n${body}`); return; }
            const {data} = await github.rest.issues.create({owner, repo, title, body, labels: ['des-reminder']});
            core.info(`Issue reminder dibuat: #${data.number}`);
