:root{

*,*::before,*::after{box-sizing:border-box}

body{margin:0;font-family:var(--font-sans);font-size:16px;line-height:1.5;color:var(--text);background:var(--bg);

.nav{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 86%,transparent);

.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* PAGE HEAD + STATS */
.pagehead{padding:22px 0 4px}

  display:flex;flex-direction:column;gap:3px;color:inherit;box-shadow:var(--shadow-card)}

.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.sec-head h2{font-size:clamp(1.2rem,3.2vw,1.55rem);letter-spacing:-.02em}
.sec-head .note{font-size:12.5px;color:var(--text-muted);text-align:right}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-card)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.card-title{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}

#grafik .card.is-collapsed .card-body{display:none}
.chart-toggle{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);border-radius:var(--r-md);padding:8px 11px;font:inherit;font-size:12.5px;font-weight:700;transition:border-color var(--dur-fast),color var(--dur-fast),background var(--dur-fast)}
.chart-toggle:hover{border-color:var(--accent);color:var(--accent)}
.chart-toggle svg{width:14px;height:14px;display:block;transition:transform var(--dur) var(--ease)}

.seg{display:inline-flex;background:var(--surface-inset);border:1px solid var(--border);border-radius:var(--r-md);padding:3px;gap:2px}
.seg-btn{border:none;background:transparent;padding:9px 13px;border-radius:var(--r-sm);font-weight:700;font-size:12.5px;color:var(--text-secondary);transition:background var(--dur-fast),color var(--dur-fast);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}

.chart-wrap{position:relative;width:100%}

  border-radius:var(--r-md);padding:9px 11px;font-size:12px;box-shadow:var(--shadow-pop);min-width:132px;opacity:0;transform:translateY(4px);transition:opacity var(--dur-fast),transform var(--dur-fast)}

.tt .r{display:flex;justify-content:space-between;gap:14px;color:var(--text-secondary);font-size:11.5px}
.tt .r b{font-family:var(--font-mono);color:var(--text);font-weight:700}
#chartSR table{font-size:12px} #chartSR td,#chartSR th{padding:2px 8px;text-align:right}

/* TIMELINE */
.tl-row{display:flex;align-items:stretch;gap:8px;margin-bottom:14px}

.tl-arrow:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.tl-arrow:disabled{opacity:.35;cursor:not-allowed}
.tl-wrap{position:relative;flex:1;min-width:0}
.tl{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.tl::-webkit-scrollbar{display:none;height:0}
.tl-wrap::after{content:"";position:absolute;top:0;right:0;bottom:10px;width:26px;pointer-events:none;background:linear-gradient(to right,transparent,var(--surface))}
.tl-box{flex:none;width:66px;min-height:64px;scroll-snap-align:center;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);
  padding:8px 4px 9px;text-align:center;cursor:pointer;transition:border-color var(--dur-fast),background var(--dur-fast);position:relative;font:inherit;color:inherit;display:block}

.tl-box .nb.pos{background:var(--up)} .tl-box .nb.neg{background:var(--down)}
.tl-box.active{border-color:var(--accent);background:var(--up-soft)}
.tl-box.active .yr{color:var(--accent-text)}

.tr-acts .btn{text-decoration:none}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.03em;padding:4px 9px;border-radius:var(--r-pill);background:var(--up-soft);color:var(--up-text)}
.chip.out{background:var(--down-soft);color:var(--down-text)}
.chip.star{background:var(--highlight-soft);color:var(--highlight-text)}
[data-theme="terminal"] .chip.out{color:var(--red-300)}
.dots{display:flex;flex-wrap:wrap;gap:5px;margin:0}
.dot{width:18px;height:18px;border-radius:var(--r-xs);border:1px solid var(--border);background:var(--surface-inset);position:relative}
.dot.on{background:var(--up);border-color:var(--up)}
.dot[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);white-space:nowrap;
  background:var(--surface);border:1px solid var(--border-strong);color:var(--text);font-family:var(--font-mono);font-size:11px;padding:4px 8px;border-radius:var(--r-sm);box-shadow:var(--shadow-pop);z-index:10}
.tr-hint{color:var(--text-muted);font-size:13px;margin-top:2px;line-height:1.55}

/* MODAL */
.modal-back{position:fixed;inset:0;z-index:60;background:rgba(6,18,31,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.modal-back.on{display:flex}
@media(min-width:640px){.modal-back{align-items:center;padding:24px}}
.modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:14px 14px 0 0;width:100%;max-width:600px;max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow-pop)}
.modal:focus{outline:none}
@media(min-width:640px){.modal{border-radius:var(--r-lg)}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:18px 18px 12px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:1.3rem;letter-spacing:-.02em;margin-bottom:3px}
.modal-head p{font-family:var(--font-sans);font-size:13px;line-height:1.5;color:var(--text-secondary)}
.modal-x{flex:none;width:42px;height:42px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);color:var(--text);
  display:grid;place-items:center;transition:background var(--dur-fast),border-color var(--dur-fast),color var(--dur-fast)}
.modal-x svg{width:18px;height:18px}
.modal-x:hover{border-color:var(--accent);color:var(--accent)}
.modal-body{padding:14px 18px 20px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.modal-body::-webkit-scrollbar{width:8px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:var(--r-pill)}
.modal-tools{display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:2;background:var(--surface);padding:2px 0 12px;margin-bottom:2px}
.taglist{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:6px}
.tag2{font-family:var(--font-mono);font-weight:700;font-size:12.5px;padding:6px 8px;border-radius:var(--r-pill);background:var(--surface-2);border:1px solid var(--border);cursor:pointer;color:var(--text);text-align:center;
  transition:border-color var(--dur-fast),color var(--dur-fast),background var(--dur-fast)}
.tag2:hover{border-color:var(--accent);color:var(--accent);background:var(--surface)}
.mlist{list-style:none;margin:0;padding:0}
.mrow{display:flex;gap:10px;align-items:baseline;padding:11px 10px;border-bottom:1px solid var(--hairline);cursor:pointer;border-radius:var(--r-sm);transition:background var(--dur-fast)}
.mrow:hover,.mrow:focus-visible{background:var(--surface-2)}
.mrow .tk{font-weight:700;font-size:13px;min-width:52px}
.mrow .nm{font-size:12.5px;color:var(--text-secondary)}
.mrow .ct{margin-left:auto;font-size:11.5px;color:var(--text-muted);font-weight:600}

/* GUIDE typography (dipakai modal + Panduan page) */
.guide h4{font-size:13px;margin:15px 0 5px;color:var(--text)} .guide h4:first-child{margin-top:0}
.guide p,.guide li{font-size:13px;color:var(--text-secondary);line-height:1.55}
.guide ul{margin:4px 0 0;padding-left:18px} .guide li{margin-bottom:4px}
.guide .disc{font-size:11.5px;color:var(--text-muted);border-left:3px solid var(--amber-500);padding-left:12px;margin-top:8px}
.guide-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.guide-links a{font-size:12.5px;font-weight:700;border:1px solid var(--border-strong);border-radius:var(--r-pill);padding:6px 12px}
.guide-links a:hover{text-decoration:none;border-color:var(--accent);color:var(--accent)}

/* PANDUAN — dokumen kontinyu (bukan pulau kartu) */
#panduanPage{display:none;padding:22px 0 24px}
body.panduan-open #app{display:none}
body.panduan-open #panduanPage{display:block}
.pg-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pg-back{display:inline-flex;align-items:center;gap:6px}
.pg-title{font-size:clamp(1.5rem,4vw,2rem);letter-spacing:-.03em}
.pg-lede{font-size:13.5px;color:var(--text-secondary);margin:6px 0 18px;max-width:none;line-height:1.55}
.pg-doc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:4px 20px 10px;box-shadow:var(--shadow-card)}
.pg-cols{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:760px){.pg-cols{grid-template-columns:1fr 1fr;column-gap:36px}}
.pg-doc > .pg-cols + .pg-cols{border-top:1px solid var(--hairline)}
.pg-sec{padding:16px 0;border-bottom:1px solid var(--hairline)}
@media(min-width:760px){
  .pg-cols .pg-sec:nth-last-child(-n+2){border-bottom:none}
}
.pg-cols .pg-sec:last-child{border-bottom:none}
.pg-sec h4{font-size:15px;margin:0 0 9px;letter-spacing:-.01em;color:var(--text);font-weight:700}
.pg-sec p,.pg-sec li{font-size:13.5px;line-height:1.6;color:var(--text-secondary)}
.pg-sec p+p{margin-top:9px}
.pg-sec ul{margin:6px 0 0;padding-left:18px}
.pg-sec li{margin-bottom:6px}
.pg-sec .glossary{list-style:none;padding:0;margin:2px 0 0}
.pg-sec .glossary li{padding:8px 0;border-bottom:1px solid var(--hairline);margin:0}
.pg-sec .glossary li:last-child{border-bottom:none}
.pg-sec .glossary b{color:var(--text)}
.pg-sec .disc{border-left:3px solid var(--amber-500);padding-left:12px;color:var(--text-muted);margin:0}
.pg-src{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);line-height:1.6}

/* FOOTER — teks kiri, icon kanan */
footer{margin-top:34px;border-top:1px solid var(--border);background:var(--surface-2)}
.foot{max-width:var(--w);margin:0 auto;padding:14px 18px;font-size:12px;color:var(--text-muted);display:flex;gap:12px 18px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.foot-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;min-width:0}
.foot a,.foot .link{color:var(--accent-text);background:none;border:0;font:inherit;cursor:pointer;padding:0;white-space:nowrap}
.foot .sep{opacity:.45;flex:none}
.foot-social{display:inline-flex;align-items:center;gap:6px;flex:none;margin-left:auto}
.foot .soc{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:var(--r-md);border:1px solid var(--border);color:var(--text-muted);background:var(--surface);text-decoration:none}
.foot .soc:hover{color:var(--accent);border-color:var(--accent);text-decoration:none}
.foot .soc svg{width:14px;height:14px;display:block}

/* TOAST */
.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,12px);background:var(--navy-900);color:#fff;border:1px solid var(--navy-700);
  padding:11px 18px;border-radius:var(--r-md);font-weight:700;font-size:13px;box-shadow:var(--shadow-pop);z-index:80;opacity:0;pointer-events:none;transition:opacity var(--dur),transform var(--dur)}
.toast.on{opacity:1;transform:translate(-50%,0)}

/* RESPONSIVE */
@media(max-width:720px){
  .io-cols{display:flex;flex-direction:column}
  #colIn{order:1}
  #colOut{order:2}
  .psum-row{grid-template-columns:1fr 1fr}
  .psum-row .tile.wide{grid-column:1/-1}
  .pagehead{order:2}
  #lacak{order:1;padding-top:18px}
  #grafik{order:3}
  #periode{order:4}
  #app{display:flex;flex-direction:column}
  .tracker-in{flex-direction:column;align-items:stretch}
  .tracker-in .search{flex:1 1 auto;min-width:0;width:100%}
  .tracker-in .btn-primary{width:100%;justify-content:center;min-height:48px;font-size:15px}
  .tr-acts{margin-left:0;width:100%}
  .tl-select{display:block}
  .tl-box{width:76px;min-height:72px;padding:10px 6px 12px}
  .tl-box .yr{font-size:15px}
  .tl{gap:8px;scroll-padding-inline:12px}
  .chart-svg .hit{stroke:transparent;stroke-width:18}
  .tt{max-width:min(220px,calc(100vw - 28px));font-size:12.5px}
  .sec-head .note{display:none}
  .foot{gap:10px}
  .foot-social{margin-left:0}
}
@media(max-width:560px){
  .card-body{padding:13px}
  .stats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:380px){ .stats{grid-template-columns:1fr 1fr} }
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
